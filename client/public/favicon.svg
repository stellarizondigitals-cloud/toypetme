<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="paw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EDE9FE"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (app-icon style) -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Main paw pad -->
  <ellipse cx="32" cy="40" rx="13" ry="11" fill="url(#paw)"/>
  <!-- Toe pads -->
  <ellipse cx="18" cy="27" rx="6" ry="5.5" fill="url(#paw)"/>
  <ellipse cx="27" cy="21" rx="6" ry="5.5" fill="url(#paw)"/>
  <ellipse cx="37" cy="21" rx="6" ry="5.5" fill="url(#paw)"/>
  <ellipse cx="46" cy="27" rx="6" ry="5.5" fill="url(#paw)"/>
  <!-- Subtle inner details on main pad -->
  <ellipse cx="32" cy="40" rx="5" ry="4" fill="#C4B5FD" opacity="0.5"/>
</svg>
