<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F3E8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#EC4899" />
    </linearGradient>
    <linearGradient id="pet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316" />
      <stop offset="100%" style="stop-color:#FBBF24" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="140" fill="#8B5CF6" opacity="0.08" />
  <circle cx="1100" cy="530" r="180" fill="#EC4899" opacity="0.08" />
  <circle cx="950" cy="120" r="80" fill="#F59E0B" opacity="0.10" />
  <circle cx="200" cy="500" r="100" fill="#06B6D4" opacity="0.08" />

  <!-- Pet character (cat-like shape) -->
  <g transform="translate(830,180)" filter="url(#glow)">
    <!-- Glow circle -->
    <circle cx="110" cy="160" r="120" fill="#8B5CF6" opacity="0.15" />
    <!-- Body -->
    <ellipse cx="110" cy="200" rx="72" ry="80" fill="url(#pet)" />
    <!-- Head -->
    <circle cx="110" cy="120" r="62" fill="url(#pet)" />
    <!-- Ears -->
    <polygon points="66,70 50,30 90,65" fill="#F97316" />
    <polygon points="154,70 170,30 130,65" fill="#F97316" />
    <polygon points="70,66 58,42 88,62" fill="#FBBF24" />
    <polygon points="150,66 162,42 132,62" fill="#FBBF24" />
    <!-- Eyes -->
    <circle cx="90" cy="115" r="14" fill="white" />
    <circle cx="130" cy="115" r="14" fill="white" />
    <circle cx="93" cy="116" r="8" fill="#1C1917" />
    <circle cx="133" cy="116" r="8" fill="#1C1917" />
    <circle cx="96" cy="113" r="3" fill="white" />
    <circle cx="136" cy="113" r="3" fill="white" />
    <!-- Nose -->
    <ellipse cx="110" cy="134" rx="5" ry="3.5" fill="#BE185D" />
    <!-- Mouth -->
    <path d="M 104,138 Q 110,144 116,138" stroke="#BE185D" stroke-width="2" fill="none" />
    <!-- Whiskers -->
    <line x1="55" y1="130" x2="96" y2="133" stroke="#1C1917" stroke-width="1.5" opacity="0.4" />
    <line x1="55" y1="138" x2="96" y2="136" stroke="#1C1917" stroke-width="1.5" opacity="0.4" />
    <line x1="124" y1="133" x2="165" y2="130" stroke="#1C1917" stroke-width="1.5" opacity="0.4" />
    <line x1="124" y1="136" x2="165" y2="138" stroke="#1C1917" stroke-width="1.5" opacity="0.4" />
    <!-- Tail -->
    <path d="M 165,250 Q 220,220 210,270 Q 200,310 170,280" stroke="#F97316" stroke-width="18" fill="none" stroke-linecap="round" />
    <!-- Paws -->
    <ellipse cx="72" cy="275" rx="28" ry="16" fill="#FBBF24" />
    <ellipse cx="148" cy="275" rx="28" ry="16" fill="#FBBF24" />
    <!-- Heart -->
    <text x="88" y="200" font-size="28" fill="#EC4899" opacity="0.8">♥</text>
  </g>

  <!-- Star particles -->
  <text x="780" y="160" font-size="22" fill="#F59E0B" opacity="0.7">★</text>
  <text x="820" y="390" font-size="16" fill="#EC4899" opacity="0.6">★</text>
  <text x="1060" y="200" font-size="18" fill="#8B5CF6" opacity="0.5">★</text>

  <!-- Main title -->
  <text x="100" y="200" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="url(#title)">ToyPetMe</text>

  <!-- Subtitle -->
  <text x="104" y="270" font-family="Arial, sans-serif" font-size="38" fill="#6B21A8" opacity="0.85">Free Virtual Pet Game</text>

  <!-- Feature pills -->
  <rect x="100" y="320" width="230" height="52" rx="26" fill="#7C3AED" opacity="0.12" />
  <text x="215" y="352" font-family="Arial, sans-serif" font-size="24" fill="#7C3AED" text-anchor="middle">Feed &amp; Play</text>

  <rect x="348" y="320" width="230" height="52" rx="26" fill="#EC4899" opacity="0.12" />
  <text x="463" y="352" font-family="Arial, sans-serif" font-size="24" fill="#EC4899" text-anchor="middle">5 Species</text>

  <rect x="596" y="320" width="230" height="52" rx="26" fill="#F59E0B" opacity="0.12" />
  <text x="711" y="352" font-family="Arial, sans-serif" font-size="24" fill="#D97706" text-anchor="middle">4 Evolutions</text>

  <!-- Bottom tagline -->
  <text x="100" y="440" font-family="Arial, sans-serif" font-size="30" fill="#7C3AED" opacity="0.7">No sign-up. Instant play. Free forever.</text>

  <!-- URL badge -->
  <rect x="100" y="480" width="380" height="58" rx="12" fill="#7C3AED" opacity="0.10" />
  <text x="290" y="517" font-family="Arial, sans-serif" font-size="26" fill="#6B21A8" text-anchor="middle" font-weight="bold">toypetme.replit.app</text>
</svg>
