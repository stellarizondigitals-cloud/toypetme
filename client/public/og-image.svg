<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5F3FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6D28D9" />
      <stop offset="100%" style="stop-color:#DB2777" />
    </linearGradient>
    <linearGradient id="pet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA" />
      <stop offset="100%" style="stop-color:#EC4899" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Soft decorative blobs -->
  <circle cx="80"   cy="80"  r="160" fill="#8B5CF6" opacity="0.07" />
  <circle cx="1120" cy="560" r="200" fill="#EC4899" opacity="0.07" />
  <circle cx="980"  cy="90"  r="90"  fill="#F59E0B" opacity="0.08" />
  <circle cx="160"  cy="520" r="110" fill="#06B6D4" opacity="0.07" />

  <!-- Logo icon (paw on rounded square) — top left -->
  <rect x="100" y="100" width="80" height="80" rx="18" fill="url(#logoGrad)" />
  <!-- Paw - main pad -->
  <ellipse cx="140" cy="158" rx="16" ry="14" fill="white"/>
  <!-- Paw - toe pads -->
  <ellipse cx="122" cy="136" rx="7.5" ry="7"  fill="white"/>
  <ellipse cx="133" cy="128" rx="7.5" ry="7"  fill="white"/>
  <ellipse cx="147" cy="128" rx="7.5" ry="7"  fill="white"/>
  <ellipse cx="158" cy="136" rx="7.5" ry="7"  fill="white"/>

  <!-- Main title -->
  <text x="200" y="168" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="url(#titleGrad)">ToyPetMe</text>

  <!-- Tagline -->
  <text x="201" y="230" font-family="Arial, sans-serif" font-size="34" fill="#5B21B6" opacity="0.85" font-weight="600">Free Virtual Pet Game Online</text>

  <!-- Feature pills row 1 -->
  <rect x="100" y="275" width="210" height="50" rx="25" fill="#7C3AED" opacity="0.13" />
  <text x="205" y="307" font-family="Arial, sans-serif" font-size="22" fill="#6D28D9" text-anchor="middle" font-weight="600">5 Pet Species</text>

  <rect x="326" y="275" width="210" height="50" rx="25" fill="#EC4899" opacity="0.13" />
  <text x="431" y="307" font-family="Arial, sans-serif" font-size="22" fill="#BE185D" text-anchor="middle" font-weight="600">4 Evolutions</text>

  <rect x="552" y="275" width="220" height="50" rx="25" fill="#F59E0B" opacity="0.13" />
  <text x="662" y="307" font-family="Arial, sans-serif" font-size="22" fill="#B45309" text-anchor="middle" font-weight="600">8 Mini-Games</text>

  <rect x="788" y="275" width="240" height="50" rx="25" fill="#10B981" opacity="0.13" />
  <text x="908" y="307" font-family="Arial, sans-serif" font-size="22" fill="#065F46" text-anchor="middle" font-weight="600">40 Achievements</text>

  <!-- Pet character — right side -->
  <g transform="translate(830,190)">
    <circle cx="110" cy="155" r="125" fill="#8B5CF6" opacity="0.12" />
    <!-- Body -->
    <ellipse cx="110" cy="210" rx="72" ry="78" fill="url(#pet)" />
    <!-- Head -->
    <circle cx="110" cy="125" r="65" fill="url(#pet)" />
    <!-- Ears -->
    <polygon points="66,72 48,28 90,66"  fill="#7C3AED" />
    <polygon points="154,72 172,28 130,66" fill="#7C3AED" />
    <polygon points="70,68 60,44 88,64"  fill="#C4B5FD" />
    <polygon points="150,68 160,44 132,64" fill="#C4B5FD" />
    <!-- Eyes -->
    <circle cx="88"  cy="118" r="14" fill="white" />
    <circle cx="132" cy="118" r="14" fill="white" />
    <circle cx="91"  cy="119" r="8"  fill="#1C1917" />
    <circle cx="135" cy="119" r="8"  fill="#1C1917" />
    <circle cx="94"  cy="116" r="3"  fill="white" />
    <circle cx="138" cy="116" r="3"  fill="white" />
    <!-- Nose -->
    <ellipse cx="110" cy="137" rx="5" ry="3.5" fill="#BE185D" />
    <!-- Mouth -->
    <path d="M 104,141 Q 110,148 116,141" stroke="#BE185D" stroke-width="2" fill="none" />
    <!-- Whiskers -->
    <line x1="52"  y1="132" x2="96"  y2="134" stroke="#1C1917" stroke-width="1.5" opacity="0.35" />
    <line x1="52"  y1="140" x2="96"  y2="138" stroke="#1C1917" stroke-width="1.5" opacity="0.35" />
    <line x1="124" y1="134" x2="168" y2="132" stroke="#1C1917" stroke-width="1.5" opacity="0.35" />
    <line x1="124" y1="138" x2="168" y2="140" stroke="#1C1917" stroke-width="1.5" opacity="0.35" />
    <!-- Tail -->
    <path d="M 165,258 Q 224,228 214,278 Q 202,318 172,288" stroke="#7C3AED" stroke-width="18" fill="none" stroke-linecap="round" />
    <!-- Paws -->
    <ellipse cx="72"  cy="282" rx="28" ry="15" fill="#C4B5FD" />
    <ellipse cx="148" cy="282" rx="28" ry="15" fill="#C4B5FD" />
  </g>

  <!-- Bottom section -->
  <text x="100" y="430" font-family="Arial, sans-serif" font-size="28" fill="#6D28D9" opacity="0.75">No sign-up. No download. Instant play. Free forever.</text>

  <!-- URL badge -->
  <rect x="100" y="468" width="320" height="56" rx="12" fill="#7C3AED" opacity="0.12" />
  <text x="260" y="503" font-family="Arial, sans-serif" font-size="26" fill="#5B21B6" text-anchor="middle" font-weight="700">toypetme.com</text>

  <!-- Sparkle accents -->
  <circle cx="750" cy="175" r="6" fill="#F59E0B" opacity="0.6"/>
  <circle cx="800" cy="420" r="4" fill="#EC4899" opacity="0.5"/>
  <circle cx="1080" cy="200" r="5" fill="#8B5CF6" opacity="0.5"/>
</svg>
